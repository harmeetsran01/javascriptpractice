<script>

    let temp = 1;
function textchange(){
    if (temp == 1){
    document.getElementsByClassName("heading")[0].innerHTML = "Now This is changed";
    console.log(document.getElementById("btn").getAttribute("id"));
    document.getElementById("btn").setAttribute("id", "btn2"); //Always overwrties the id of the button to btn2
temp = 0;}

else{
document.getElementsByClassName("heading")[0].innerHTML = "My Website";   
temp = 1;} 
}

function darktheme(){
    if (temp == 1){
document.getElementById("htmlbody").style.backgroundColor = "white";
document.getElementById("htmlbody").style.color = "black";
    document.getElementById("btn").innerHTML = "Change to Dark Theme";

temp = 0;
}
else{
    document.getElementById("htmlbody").style.backgroundColor = "black";
    document.getElementById("htmlbody").style.color = "white";
    document.getElementById("btn").innerHTML = "Change to Light Theme";

temp = 1;} 
}
